<h1> Currency Converter</h1>
<label>Amount</label>
<input type="number" [formControl]="amount">

<label>Currency</label>

<option-selector
  [options]="currencies"
  [(selected)]="currency"
  (outputVariable)="logOutputVariable($event)"
/>

<currency-converter 
  [amount]="amount.value!" 
  [currency]="currency()"
  (refreshRequired)="refreshData()">
/>
